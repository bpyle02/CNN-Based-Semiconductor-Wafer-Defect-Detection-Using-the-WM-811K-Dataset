# Wafer Defect Detection Configuration
# Comprehensive configuration for training, evaluation, and deployment

# ============================================================================
# DATA CONFIGURATION
# ============================================================================
data:
  dataset_path: data/LSWMD_new.pkl
  image_size: 96
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15
  num_workers: 0
  pin_memory: false

  # Data augmentation
  augmentation:
    enabled: true
    random_rotation: 15
    horizontal_flip: true
    vertical_flip: false
    gaussian_noise: 0.01
    brightness: 0.1
    contrast: 0.1

# ============================================================================
# MODEL CONFIGURATION
# ============================================================================
models:
  cnn:
    name: "Custom CNN"
    architecture: "custom"
    input_channels: 1
    num_classes: 9
    dropout_rate: 0.5
    use_batch_norm: true
    parameters:
      total: 1234567
      trainable: 1234567

  resnet:
    name: "ResNet-18"
    architecture: "resnet18"
    pretrained: true
    freeze_until: "layer3"  # Freeze everything before layer4
    num_classes: 9
    dropout_rate: 0.5
    parameters:
      total: 11187905
      trainable: 3456789

  efficientnet:
    name: "EfficientNet-B0"
    architecture: "efficientnet_b0"
    pretrained: true
    freeze_until: "features.6"  # Freeze everything before features.7
    num_classes: 9
    dropout_rate: 0.5
    parameters:
      total: 5288548
      trainable: 2109876

# ============================================================================
# TRAINING CONFIGURATION
# ============================================================================
training:
  default_model: "all"  # "cnn", "resnet", "efficientnet", "all"
  epochs: 5
  batch_size: 64
  learning_rate:
    cnn: 1e-3
    resnet: 1e-4
    efficientnet: 1e-4
  weight_decay: 1e-4
  gradient_clip_max_norm: 1.0

  # Optimizer
  optimizer: "adam"  # "adam", "sgd", "adamw"

  # Learning rate scheduler
  scheduler:
    type: "ReduceLROnPlateau"
    mode: "min"
    factor: 0.5
    patience: 3
    min_lr: 1e-6
    verbose: true

  # Loss function
  loss:
    type: "CrossEntropyLoss"
    weighted: true
    class_weights: null  # Computed from data if null

  # Early stopping
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 1e-4

  # Checkpointing
  checkpointing:
    enabled: true
    save_dir: "checkpoints"
    save_best_only: true
    metric: "val_loss"

# ============================================================================
# VALIDATION CONFIGURATION
# ============================================================================
validation:
  eval_every_n_epochs: 1
  compute_confusion_matrix: true
  compute_per_class_metrics: true
  compute_gradcam: true
  num_gradcam_samples: 9

# ============================================================================
# INFERENCE CONFIGURATION
# ============================================================================
inference:
  model_path: "checkpoints/best_model.pth"
  batch_size: 32
  num_workers: 4
  device: "cuda"  # "cuda" or "cpu"
  use_half_precision: false

  # GradCAM settings
  gradcam:
    enabled: true
    target_layer: null  # Auto-selected if null
    colormap: "jet"

# ============================================================================
# ENSEMBLE CONFIGURATION
# ============================================================================
ensemble:
  enabled: false
  models: ["cnn", "resnet", "efficientnet"]
  aggregation: "voting"  # "voting", "averaging", "weighted_averaging"
  weights: [0.33, 0.33, 0.34]  # For weighted averaging

# ============================================================================
# HYPERPARAMETER TUNING CONFIGURATION
# ============================================================================
tuning:
  enabled: false
  method: "optuna"  # "optuna", "grid_search", "random_search"
  n_trials: 100
  n_jobs: 4

  # Search space
  search_space:
    learning_rate: [1e-5, 1e-2]
    batch_size: [32, 64, 128]
    dropout_rate: [0.3, 0.7]
    weight_decay: [1e-5, 1e-3]

  # Optimization target
  optimization:
    metric: "macro_f1"  # "accuracy", "macro_f1", "weighted_f1"
    direction: "maximize"  # "maximize" or "minimize"

# ============================================================================
# COMPRESSION CONFIGURATION
# ============================================================================
compression:
  enabled: false

  # Quantization
  quantization:
    enabled: false
    dtype: "int8"  # "int8", "int16", "float16"

  # Pruning
  pruning:
    enabled: false
    percentage: 0.3  # Prune 30% of weights

  # Knowledge distillation
  distillation:
    enabled: false
    teacher_model: "checkpoints/best_model.pth"
    temperature: 4.0
    alpha: 0.7  # Weight of distillation loss

# ============================================================================
# ACTIVE LEARNING CONFIGURATION
# ============================================================================
active_learning:
  enabled: false
  strategy: "uncertainty"  # "uncertainty", "diversity", "hybrid"
  initial_labeled: 0.1  # Start with 10% labeled data
  acquisition_size: 100  # Add 100 samples per iteration
  max_iterations: 10
  uncertainty_method: "entropy"  # "entropy", "margin", "lc"

# ============================================================================
# MLOps CONFIGURATION
# ============================================================================
mlops:
  # Weights & Biases
  wandb:
    enabled: false
    project: "wafer-defect-detection"
    entity: null  # Your W&B username
    tags: ["production", "v1.0"]

  # MLflow
  mlflow:
    enabled: false
    tracking_uri: "http://localhost:5000"
    experiment_name: "wafer_defect"

  # Logging
  logging:
    level: "INFO"  # "DEBUG", "INFO", "WARNING", "ERROR"
    log_dir: "logs"
    save_configs: true

# ============================================================================
# CROSS-VALIDATION CONFIGURATION
# ============================================================================
cross_validation:
  enabled: false
  n_splits: 5
  method: "stratified_kfold"  # "stratified_kfold", "kfold", "group_kfold"
  random_state: 42

# ============================================================================
# PROGRESSIVE TRAINING CONFIGURATION
# ============================================================================
progressive_training:
  enabled: false
  stages:
    - image_size: 48
      epochs: 2
      learning_rate_factor: 1.0
    - image_size: 96
      epochs: 3
      learning_rate_factor: 0.5
    - image_size: 192
      epochs: 2
      learning_rate_factor: 0.25

# ============================================================================
# MULTI-GPU CONFIGURATION
# ============================================================================
distributed:
  enabled: false
  backend: "nccl"  # "nccl" (GPU), "gloo" (CPU)
  world_size: 1
  rank: 0
  master_addr: "localhost"
  master_port: 29500

# ============================================================================
# UNCERTAINTY QUANTIFICATION
# ============================================================================
uncertainty:
  enabled: false
  method: "monte_carlo_dropout"  # "monte_carlo_dropout", "ensemble"
  n_samples: 10  # Number of forward passes
  dropout_rate: 0.5

# ============================================================================
# EVALUATION CONFIGURATION
# ============================================================================
evaluation:
  metrics:
    - "accuracy"
    - "macro_f1"
    - "weighted_f1"
    - "precision"
    - "recall"
    - "confusion_matrix"

  visualizations:
    - "training_curves"
    - "confusion_matrix"
    - "per_class_f1"
    - "model_comparison"
    - "gradcam"

  save_predictions: true
  output_dir: "results"

# ============================================================================
# DEVICE CONFIGURATION
# ============================================================================
device:
  type: "cuda"  # "cuda" or "cpu"
  device_ids: [0]  # GPU IDs to use
  seed: 42
  deterministic: true
  benchmark: true  # Enable CUDA benchmarking

# ============================================================================
# PATHS CONFIGURATION
# ============================================================================
paths:
  data_dir: "data"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  result_dir: "results"
  config_dir: "configs"

# ============================================================================
# EXPORT/DEPLOYMENT CONFIGURATION
# ============================================================================
export:
  enabled: false
  format: "onnx"  # "onnx", "torchscript", "savedmodel"
  output_dir: "exported_models"
  optimize: true  # Optimize for inference
  quantize_for_export: false
