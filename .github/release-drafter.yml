name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Bug Fixes"
    labels:
      - "fix"
      - "bug"
  - title: "Documentation"
    labels:
      - "docs"
      - "documentation"
  - title: "Performance"
    labels:
      - "perf"
      - "performance"
  - title: "Refactors"
    labels:
      - "refactor"
  - title: "Chores"
    labels:
      - "chore"
      - "dependencies"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - "major"
      - "breaking"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bug"
      - "docs"
      - "chore"
      - "perf"
      - "refactor"
  default: patch

exclude-labels:
  - "skip-changelog"
  - "no-release"

template: |
  ## Changes in $RESOLVED_VERSION

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
