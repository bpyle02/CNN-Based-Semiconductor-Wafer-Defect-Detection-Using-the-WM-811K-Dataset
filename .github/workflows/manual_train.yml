name: Manual Training Launcher

# Manually triggered workflow that:
#   (a) runs a bounded CPU smoke training on the GitHub-hosted runner, and
#   (b) prints a ready-to-use Colab URL with the chosen parameters so you can
#       kick off a full GPU run in your browser.
#
# There are no free GPUs on GitHub-hosted runners, so real training happens in
# Colab. A self-hosted GPU runner can be wired in via the `gpu_runner` job
# below — edit `runs-on` to match your runner labels and set `enabled: true`.

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Model: cnn | cnn_fpn | resnet | efficientnet | vit | swin | all'
        required: true
        default: 'all'
        type: choice
        options: [cnn, cnn_fpn, resnet, efficientnet, vit, swin, all]
      epochs:
        description: 'Number of epochs'
        required: true
        default: '20'
      batch_size:
        description: 'Batch size (lower if OOM on T4: 64 or 32)'
        required: true
        default: '128'
      run_cpu_smoke:
        description: 'Also run a tiny CPU smoke training on the runner?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      use_self_hosted_gpu:
        description: 'Run real training on a self-hosted GPU runner (if one is available)?'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  colab_launcher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute Colab URL with selected params
        id: url
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          REF="${GITHUB_REF_NAME}"
          MODEL="${{ inputs.model }}"
          EPOCHS="${{ inputs.epochs }}"
          BATCH="${{ inputs.batch_size }}"

          BASE="https://colab.research.google.com/github/${OWNER}/${REPO}/blob/${REF}/docs/colab_quickstart.ipynb"
          echo "colab_url=$BASE" >> "$GITHUB_OUTPUT"

          {
            echo '## Colab training launcher'
            echo
            echo "**Open the notebook in Colab:** $BASE"
            echo
            echo '### Recommended training command in Colab'
            echo '```bash'
            echo "python train.py --model $MODEL --epochs $EPOCHS --batch-size $BATCH --device cuda"
            echo '```'
            echo
            echo 'Before running: `Runtime → Change runtime type → T4 GPU`.'
            echo
            echo '### Parameters'
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| model | \`$MODEL\` |"
            echo "| epochs | \`$EPOCHS\` |"
            echo "| batch_size | \`$BATCH\` |"
            echo "| git ref | \`$REF\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  cpu_smoke:
    if: ${{ inputs.run_cpu_smoke == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Synthetic mini-dataset (no real WM-811K needed)
        run: |
          python - <<'EOF'
          import numpy as np, pandas as pd, os
          os.makedirs('data', exist_ok=True)
          n = 200
          wm = [np.random.randint(0, 3, (26, 26), dtype=np.uint8) for _ in range(n)]
          classes = ['Center','Donut','Edge-Loc','Edge-Ring','Loc','Near-full','Random','Scratch','none']
          labels = np.random.choice(classes, size=n)
          train_test = np.random.choice(['Training','Test'], size=n, p=[0.8, 0.2])
          df = pd.DataFrame({'waferMap': wm, 'failureType': labels, 'trianTestLabel': train_test})
          df.to_pickle('data/LSWMD_new.pkl')
          print('Synthetic dataset:', df.shape)
          EOF
      - name: 1-epoch CPU smoke
        run: |
          python train.py --model cnn --epochs 1 --batch-size 16 --device cpu || true

  gpu_runner:
    if: ${{ inputs.use_self_hosted_gpu == 'true' }}
    # Edit runs-on to match your self-hosted runner labels, e.g. [self-hosted, gpu]
    runs-on: [self-hosted, gpu]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -e ".[dev]"
      - name: Confirm GPU is visible
        run: |
          nvidia-smi
          python -c "import torch; assert torch.cuda.is_available(); print(torch.cuda.get_device_name(0))"
      - name: Place dataset
        # The self-hosted runner must have LSWMD_new.pkl pre-staged at $DATASET_PATH.
        env:
          DATASET_PATH: ${{ secrets.DATASET_PATH }}
        run: |
          mkdir -p data
          cp "$DATASET_PATH" data/LSWMD_new.pkl
      - name: Full training
        run: |
          python train.py \
            --model ${{ inputs.model }} \
            --epochs ${{ inputs.epochs }} \
            --batch-size ${{ inputs.batch_size }} \
            --device cuda
      - uses: actions/upload-artifact@v4
        with:
          name: training-outputs
          path: |
            checkpoints/
            results/
