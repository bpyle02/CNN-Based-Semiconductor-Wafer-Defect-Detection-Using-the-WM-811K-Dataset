name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: flake8 (syntax / undefined names)
        run: flake8 src train.py --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: flake8 (style, warn-only)
        run: flake8 src train.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
      - name: black --check
        run: black --check --line-length=100 src/ train.py
      - name: isort --check-only
        run: isort --check-only --profile black src/ train.py
      - name: nbqa flake8 on notebooks
        run: |
          pip install nbqa
          nbqa flake8 docs/*.ipynb

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Import smoke
        run: |
          python -c "from src.models import WaferCNN, get_resnet18, get_efficientnet_b0; print('models OK')"
          python -c "from src.data import load_dataset, preprocess_wafer_maps, WaferMapDataset; print('data OK')"
          python -c "from src.training import train_model; print('training OK')"
          python -c "from src.analysis import evaluate_model; print('analysis OK')"
      - name: CLI self-describes
        run: python train.py --help
      - name: Tests with coverage (ubuntu full suite)
        if: matrix.os == 'ubuntu-latest'
        run: pytest --cov=src --cov-report=xml --cov-report=term --cov-fail-under=70
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
      - name: Tests (smoke subset on windows/macos)
        if: matrix.os != 'ubuntu-latest'
        shell: bash
        run: |
          if [ -f tests/unit/test_smoke.py ]; then
            pytest tests/unit/test_smoke.py
          else
            pytest -q --ignore=tests/integration --maxfail=5
          fi
      - name: Config load (base + colab_fast overlay)
        if: matrix.os == 'ubuntu-latest'
        run: python -c "from src.config import load_config, load_merged_config; cfg = load_config('config.yaml'); print('device:', cfg.device); cfg2 = load_merged_config(['config.yaml', 'configs/colab_fast.yaml']); print('overlay patience:', cfg2.training.early_stopping.patience)"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - run: docker build --target prod -t wafer-test .
      - run: docker run --rm wafer-test python -c "from src.models import WaferCNN; WaferCNN()"

  metrics-regression:
    runs-on: ubuntu-latest
    # Only run the regression guard when results/metrics.json changed in the PR.
    # Pushes to main always run it so a force-push or direct commit still gates.
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'metrics') || github.event.pull_request.changed_files > 0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Check metrics vs baseline
        run: python scripts/check_metrics.py --baseline results/metrics.baseline.json --current results/metrics.json
