name: Documentation

on:
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "README.md"
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Sphinx docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-lock.txt

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "sphinx>=7" \
            "sphinx-autoapi>=3" \
            "sphinx-rtd-theme>=2" \
            "myst-parser>=2" \
            "linkify-it-py>=2"

      - name: Build HTML (fail on warnings)
        run: |
          sphinx-build -W --keep-going -b html docs/sphinx docs/sphinx/_build/html

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-html
          path: docs/sphinx/_build/html
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-lock.txt

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "sphinx>=7" \
            "sphinx-autoapi>=3" \
            "sphinx-rtd-theme>=2" \
            "myst-parser>=2" \
            "linkify-it-py>=2"

      - name: Build HTML
        run: |
          sphinx-build -b html docs/sphinx docs/sphinx/_build/html
          touch docs/sphinx/_build/html/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/sphinx/_build/html
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "docs: deploy ${{ github.sha }}"
