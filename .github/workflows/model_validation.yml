name: Model Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/models/**'
      - 'src/training/**'
      - 'src/data/**'
      - 'src/inference/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/models/**'
      - 'src/training/**'
      - 'src/data/**'
      - 'src/inference/**'
  workflow_dispatch:

jobs:
  validate_models:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"

      - name: Forward pass - WaferCNN
        run: |
          python - <<'EOF'
          import torch
          from src.models import WaferCNN
          m = WaferCNN(num_classes=9); m.eval()
          y = m(torch.randn(2, 3, 96, 96))
          assert y.shape == (2, 9), y.shape
          print('WaferCNN OK', y.shape)
          EOF

      - name: Forward pass - ResNet-18
        run: |
          python - <<'EOF'
          import torch
          from src.models import get_resnet18
          m = get_resnet18(num_classes=9); m.eval()
          y = m(torch.randn(2, 3, 96, 96))
          assert y.shape == (2, 9), y.shape
          print('ResNet-18 OK', y.shape)
          EOF

      - name: Forward pass - EfficientNet-B0
        run: |
          python - <<'EOF'
          import torch
          from src.models import get_efficientnet_b0
          m = get_efficientnet_b0(num_classes=9); m.eval()
          y = m(torch.randn(2, 3, 96, 96))
          assert y.shape == (2, 9), y.shape
          print('EfficientNet-B0 OK', y.shape)
          EOF

      - name: Forward pass - ViT-Small
        run: |
          python - <<'EOF'
          import torch
          from src.models import get_vit_small
          m = get_vit_small(num_classes=9); m.eval()
          y = m(torch.randn(2, 3, 96, 96))
          assert y.shape == (2, 9), y.shape
          print('ViT-Small OK', y.shape)
          EOF

      - name: Data pipeline
        run: |
          python - <<'EOF'
          import torch, numpy as np
          from src.data import WaferMapDataset, get_image_transforms
          maps = np.random.randn(10, 96, 96).astype(np.float32)
          labels = np.arange(10) % 9
          ds = WaferMapDataset(maps, labels, transform=get_image_transforms())
          assert len(ds) == 10
          loader = torch.utils.data.DataLoader(ds, batch_size=4)
          batch = next(iter(loader))
          assert batch[0].shape == (4, 3, 96, 96), batch[0].shape
          print('Data pipeline OK')
          EOF

      - name: Grad-CAM
        run: |
          python - <<'EOF'
          import torch
          from src.inference.gradcam import GradCAM
          from src.models import WaferCNN
          m = WaferCNN(num_classes=9)
          gc = GradCAM(m, target_layer=m.features)
          heat, pred = gc.generate(torch.randn(1, 3, 96, 96), target_class=0)
          assert heat is not None
          gc.remove_hooks()
          print('Grad-CAM OK')
          EOF

      - name: CPU inference benchmark
        run: |
          python - <<'EOF'
          import torch, time
          from src.models import WaferCNN, get_resnet18, get_efficientnet_b0
          models = {'CNN': WaferCNN(9), 'ResNet-18': get_resnet18(9), 'EffNet-B0': get_efficientnet_b0(9)}
          x = torch.randn(1, 3, 96, 96)
          with torch.no_grad():
              for name, m in models.items():
                  m.eval(); _ = m(x)
                  t0 = time.time()
                  for _ in range(50): _ = m(x)
                  print(f'{name:12s} {(time.time()-t0)/50*1000:.2f} ms/infer')
          EOF
